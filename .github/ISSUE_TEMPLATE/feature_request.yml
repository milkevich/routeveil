name: Feature request
description: Propose a focused improvement to Routeveil.
title: "feature: "
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem or limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired behavior without assuming an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain current workarounds or alternative approaches.
